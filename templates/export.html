{% extends "base.html" %}

{% block title %}Data Export & Sync{% endblock %}

{% block content %}
<main style="max-width:1200px; margin:40px auto; padding:0 20px">
  <div class="card">
    <h2>📊 Data Export & Sync</h2>
    <p class="small muted">Exportez vos données en CSV/JSON/XML et synchronisez vers le cloud</p>
    
    <div class="nav-tabs" style="margin-top:20px;">
      <button class="btn-tab active" onclick="switchTab(event, 'export')">📥 Exporter</button>
      <button class="btn-tab" onclick="switchTab(event, 'sync')">☁️ Synchroniser Cloud</button>
      <button class="btn-tab" onclick="switchTab(event, 'exports')">📋 Mes Exports</button>
    </div>

    <!-- TAB 1: EXPORT -->
    <div id="export" class="tab-pane active">
      <h3>📥 Exporter les Données</h3>
      <div style="display:grid; grid-template-columns:1fr 1fr; gap:15px;">
        <div>
          <label>Type de données:</label>
          <select id="dataType">
            <option value="users">Utilisateurs</option>
            <option value="courses">Cours</option>
            <option value="payments">Paiements</option>
            <option value="logs">Logs</option>
          </select>
        </div>
        <div>
          <label>Format:</label>
          <select id="exportFormat">
            <option value="csv">CSV</option>
            <option value="json">JSON</option>
            <option value="xml">XML</option>
          </select>
        </div>
      </div>
      <div style="margin-top:10px;">
        <label>
          <input type="checkbox" id="includeCompression"> Compresser (gzip)
        </label>
      </div>
      <button type="button" onclick="exportData()" class="btn btn-primary" style="margin-top:15px;">
        Exporter
      </button>
      <div id="exportResult" style="margin-top:20px; display:none;"></div>
    </div>

    <!-- TAB 2: SYNC -->
    <div id="sync" class="tab-pane">
      <h3>☁️ Synchroniser vers Cloud</h3>
      <div style="display:grid; grid-template-columns:1fr 1fr; gap:15px;">
        <div>
          <label>Type de données:</label>
          <select id="syncDataType">
            <option value="users">Utilisateurs</option>
            <option value="courses">Cours</option>
            <option value="logs">Logs</option>
          </select>
        </div>
        <div>
          <label>Destination:</label>
          <select id="syncDestination">
            <option value="s3">AWS S3</option>
            <option value="gdrive">Google Drive</option>
          </select>
        </div>
      </div>
      <div style="margin-top:10px;">
        <label>Archiver automatiquement:</label>
        <label>
          <input type="checkbox" id="autoArchive"> Oui
        </label>
      </div>
      <button type="button" onclick="syncToCloud()" class="btn btn-primary" style="margin-top:15px;">
        Synchroniser
      </button>
      <div id="syncResult" style="margin-top:20px; display:none;"></div>
    </div>

    <!-- TAB 3: EXPORTS -->
    <div id="exports" class="tab-pane">
      <h3>📋 Mes Exports</h3>
      <button type="button" onclick="loadExports()" class="btn btn-secondary">
        Charger Exports
      </button>
      <div id="exportsList" style="margin-top:15px;"></div>
    </div>

  </div>
</main>

<style>
  .nav-tabs {
    display: flex;
    gap: 10px;
    border-bottom: 2px solid #e0e0e0;
  }
  .btn-tab {
    background: none;
    border: none;
    padding: 12px 15px;
    cursor: pointer;
    border-bottom: 3px solid transparent;
    font-weight: 500;
    color: #666;
  }
  .btn-tab.active {
    border-bottom-color: #007bff;
    color: #007bff;
  }
  .tab-pane {
    display: none;
    padding: 20px 0;
  }
  .tab-pane.active {
    display: block;
  }
  select {
    width: 100%;
    padding: 10px;
    border: 1px solid #ddd;
    border-radius: 4px;
  }
  #exportResult, #syncResult {
    background: #d4edda;
    padding: 15px;
    border-radius: 4px;
    border-left: 4px solid #28a745;
    color: #155724;
  }
  #exportResult h4, #syncResult h4 {
    color: #155724;
    margin-top: 0;
  }
  #exportResult p, #exportResult strong,
  #syncResult p, #syncResult strong {
    color: #155724;
  }
</style>

<script>
  function switchTab(event, tabName) {
    event.preventDefault();
    document.querySelectorAll('.tab-pane').forEach(pane => pane.classList.remove('active'));
    document.querySelectorAll('.btn-tab').forEach(btn => btn.classList.remove('active'));
    document.getElementById(tabName).classList.add('active');
    event.target.classList.add('active');
  }

  async function exportData() {
    const data = {
      data_type: document.getElementById('dataType').value,
      format: document.getElementById('exportFormat').value,
      include_compression: document.getElementById('includeCompression').checked
    };

    try {
      const response = await fetch('/modules/export/export-data', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(data)
      });
      const result = await response.json();
      
      if (result.success) {
        document.getElementById('exportResult').innerHTML = `
          <h4>✅ Export Créé!</h4>
          <p>Fichier: <strong>${result.filename}</strong></p>
          <p>Taille: ${(result.size / 1024).toFixed(2)} KB</p>
          <a href="${result.download_url}" class="btn btn-primary" download>Télécharger</a>
        `;
        document.getElementById('exportResult').style.display = 'block';
      } else {
        alert('Erreur: ' + result.error);
      }
    } catch (error) {
      alert('Erreur: ' + error.message);
    }
  }

  async function syncToCloud() {
    const data = {
      data_type: document.getElementById('syncDataType').value,
      destination: document.getElementById('syncDestination').value,
      auto_archive: document.getElementById('autoArchive').checked
    };

    try {
      const response = await fetch('/modules/export/sync-to-cloud', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(data)
      });
      const result = await response.json();
      
      if (result.success) {
        document.getElementById('syncResult').innerHTML = `
          <h4>✅ Synchronisation Réussie!</h4>
          <p>${result.message}</p>
          <p>Records: ${result.records_synced}</p>
        `;
        document.getElementById('syncResult').style.display = 'block';
      } else {
        alert('Erreur: ' + result.error);
      }
    } catch (error) {
      alert('Erreur: ' + error.message);
    }
  }

  async function loadExports() {
    try {
      const response = await fetch('/modules/export/exports');
      const result = await response.json();
      
      const html = result.exports.map(e => `
        <div style="background:#f9f9f9; padding:10px; margin:10px 0; border-radius:4px;">
          <strong>${e.filename}</strong><br>
          Type: ${e.data_type} | Format: ${e.format} | Taille: ${(e.size/1024).toFixed(2)} KB
        </div>
      `).join('');
      
      document.getElementById('exportsList').innerHTML = html || '<p>Aucun export</p>';
    } catch (error) {
      alert('Erreur: ' + error.message);
    }
  }
</script>
{% endblock %}
