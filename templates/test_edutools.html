<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Test EduTools-IA</title>
  <link rel="stylesheet" href="/static/css/edutools-ia.css">
  <link rel="stylesheet" href="/static/css/styles.css">
  <style>
    body { font-family: Arial, sans-serif; padding: 20px; }
    .console { background: #222; color: #0f0; padding: 20px; border-radius: 8px; margin-top: 20px; font-family: monospace; max-height: 300px; overflow-y: auto; }
    .console-log { margin: 5px 0; }
    .console-error { color: #f66; }
    .console-info { color: #0f0; }
  </style>
</head>
<body>
  <h1>🧪 Test EduTools-IA</h1>
  <p>Cette page teste si le JavaScript EduTools-IA se charge correctement.</p>
  
  <div id="console" class="console">
    <div class="console-log console-info">Initialisation du test...</div>
  </div>

  <script>
    const console_el = document.getElementById('console');
    
    const originalLog = console.log;
    const originalError = console.error;
    
    console.log = function(...args) {
      originalLog.apply(console, args);
      const msg = args.join(' ');
      const div = document.createElement('div');
      div.className = 'console-log console-info';
      div.textContent = msg;
      console_el.appendChild(div);
      console_el.scrollTop = console_el.scrollHeight;
    };
    
    console.error = function(...args) {
      originalError.apply(console, args);
      const msg = args.join(' ');
      const div = document.createElement('div');
      div.className = 'console-log console-error';
      div.textContent = 'ERROR: ' + msg;
      console_el.appendChild(div);
      console_el.scrollTop = console_el.scrollHeight;
    };
  </script>

  <script src="/static/js/edutools-ia.js" defer></script>

  <script>
    setTimeout(() => {
      console.log('Après 1s: window.edutoolsIA =', window.edutoolsIA);
      console.log('Docum ent.querySelector("#edutools-ia-button") =', document.querySelector('#edutools-ia-button'));
      const button = document.querySelector('#edutools-ia-button');
      if (button) {
        console.log('✅ Bouton trouvé!');
        console.log('Position:', button.getBoundingClientRect());
        console.log('Styles:', getComputedStyle(button));
      } else {
        console.error('❌ Bouton NOT FOUND!');
      }
    }, 1000);
  </script>
</body>
</html>
