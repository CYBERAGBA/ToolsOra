{% extends "base.html" %}

{% block title %}SMS & WhatsApp Broadcast{% endblock %}

{% block content %}
<main style="max-width:1200px; margin:40px auto; padding:0 20px">
  <div class="card">
    <h2>📱 SMS & WhatsApp Broadcast</h2>
    <p class="small muted">Envoyez des SMS et WhatsApp en masse avec Twilio</p>
    
    <div class="nav-tabs" style="margin-top:20px;">
      <button class="btn-tab active" onclick="switchTab(event, 'sms')">📧 Envoyer SMS</button>
      <button class="btn-tab" onclick="switchTab(event, 'whatsapp')">💬 Envoyer WhatsApp</button>
      <button class="btn-tab" onclick="switchTab(event, 'campaigns')">📊 Mes Campagnes</button>
    </div>

    <!-- TAB 1: SMS -->
    <div id="sms" class="tab-pane active">
      <h3>📧 Envoyer un SMS</h3>
      <div>
        <label>Nom de la campagne:</label>
        <input type="text" id="smsCampaignName" placeholder="Ex: Promotion Été 2026">
      </div>
      <div style="margin-top:10px;">
        <label>Message:</label>
        <textarea id="smsMessage" placeholder="Votre message SMS (max 160 caractères)" style="width:100%; height:80px;"></textarea>
        <small id="smsLength">0/160</small>
      </div>
      <div style="margin-top:10px;">
        <label>Destinataires (un par ligne):</label>
        <textarea id="smsRecipients" placeholder="+33612345678&#10;+33612345679&#10;+33612345680" style="width:100%; height:100px;"></textarea>
      </div>
      <button type="button" onclick="sendSMS()" class="btn btn-primary" style="margin-top:10px;">
        Envoyer SMS
      </button>
      <div id="smsResult" style="margin-top:20px; display:none;"></div>
    </div>

    <!-- TAB 2: WHATSAPP -->
    <div id="whatsapp" class="tab-pane">
      <h3>💬 Envoyer WhatsApp</h3>
      <div>
        <label>Nom de la campagne:</label>
        <input type="text" id="whatsappCampaignName" placeholder="Ex: Support Client">
      </div>
      <div style="margin-top:10px;">
        <label>Message:</label>
        <textarea id="whatsappMessage" placeholder="Votre message WhatsApp" style="width:100%; height:80px;"></textarea>
      </div>
      <div style="margin-top:10px;">
        <label>URL Media (optionnel):</label>
        <input type="url" id="whatsappMedia" placeholder="https://example.com/image.jpg">
      </div>
      <div style="margin-top:10px;">
        <label>Destinataires (un par ligne):</label>
        <textarea id="whatsappRecipients" placeholder="+33612345678&#10;+33612345679" style="width:100%; height:100px;"></textarea>
      </div>
      <button type="button" onclick="sendWhatsApp()" class="btn btn-primary" style="margin-top:10px;">
        Envoyer WhatsApp
      </button>
      <div id="whatsappResult" style="margin-top:20px; display:none;"></div>
    </div>

    <!-- TAB 3: CAMPAIGNS -->
    <div id="campaigns" class="tab-pane">
      <h3>📊 Mes Campagnes</h3>
      <button type="button" onclick="loadCampaigns()" class="btn btn-secondary">
        Charger Campagnes
      </button>
      <div id="campaignsList" style="margin-top:15px;"></div>
    </div>

  </div>
</main>

<style>
  .nav-tabs {
    display: flex;
    gap: 10px;
    border-bottom: 2px solid #e0e0e0;
    flex-wrap: wrap;
  }
  .btn-tab {
    background: none;
    border: none;
    padding: 12px 15px;
    cursor: pointer;
    border-bottom: 3px solid transparent;
    font-size: 14px;
    font-weight: 500;
    color: #666;
    transition: all 0.3s;
  }
  .btn-tab.active {
    border-bottom-color: #007bff;
    color: #007bff;
  }
  .tab-pane {
    display: none;
    padding: 20px 0;
  }
  .tab-pane.active {
    display: block;
  }
  input, textarea {
    padding: 10px;
    border: 1px solid #ddd;
    border-radius: 4px;
    font-family: inherit;
  }
  #smsResult, #whatsappResult {
    background: #f5f5f5;
    padding: 15px;
    border-radius: 4px;
    border-left: 4px solid #28a745;
    color: #333;
  }
  #smsResult h4, #whatsappResult h4 {
    color: #28a745;
    margin-top: 0;
  }
  #smsResult p, #smsResult strong,
  #whatsappResult p, #whatsappResult strong {
    color: #333;
  }
</style>

<script>
  function switchTab(event, tabName) {
    event.preventDefault();
    document.querySelectorAll('.tab-pane').forEach(pane => pane.classList.remove('active'));
    document.querySelectorAll('.btn-tab').forEach(btn => btn.classList.remove('active'));
    document.getElementById(tabName).classList.add('active');
    event.target.classList.add('active');
  }

  // SMS length counter
  document.getElementById('smsMessage')?.addEventListener('input', function() {
    document.getElementById('smsLength').textContent = this.value.length + '/160';
  });

  async function sendSMS() {
    const recipients = document.getElementById('smsRecipients').value.trim().split('\n').filter(r => r);
    const data = {
      message: document.getElementById('smsMessage').value,
      recipients: recipients,
      campaign_name: document.getElementById('smsCampaignName').value || 'SMS Campaign'
    };

    try {
      const response = await fetch('/modules/sms/send-sms', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(data)
      });
      const result = await response.json();
      
      if (result.success) {
        document.getElementById('smsResult').innerHTML = `
          <h4>✅ SMS Envoyés!</h4>
          <p>Campagne: <strong>${result.campaign_id}</strong></p>
          <p>Envoyés: ${result.sent}/${result.total}</p>
          <p>Erreurs: ${result.failed}</p>
        `;
        document.getElementById('smsResult').style.display = 'block';
      } else {
        alert('Erreur: ' + result.error);
      }
    } catch (error) {
      alert('Erreur: ' + error.message);
    }
  }

  async function sendWhatsApp() {
    const recipients = document.getElementById('whatsappRecipients').value.trim().split('\n').filter(r => r);
    const data = {
      message: document.getElementById('whatsappMessage').value,
      recipients: recipients,
      campaign_name: document.getElementById('whatsappCampaignName').value || 'WhatsApp Campaign',
      media_url: document.getElementById('whatsappMedia').value || undefined
    };

    try {
      const response = await fetch('/modules/sms/send-whatsapp', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(data)
      });
      const result = await response.json();
      
      if (result.success) {
        document.getElementById('whatsappResult').innerHTML = `
          <h4>✅ Messages WhatsApp Envoyés!</h4>
          <p>Envoyés: ${result.sent}/${result.total}</p>
        `;
        document.getElementById('whatsappResult').style.display = 'block';
      } else {
        alert('Erreur: ' + result.error);
      }
    } catch (error) {
      alert('Erreur: ' + error.message);
    }
  }

  async function loadCampaigns() {
    try {
      const response = await fetch('/modules/sms/campaigns');
      const result = await response.json();
      
      const html = result.campaigns.map(c => `
        <div style="background:#f9f9f9; padding:10px; margin:10px 0; border-radius:4px;">
          <strong>${c.campaign_name}</strong><br>
          Envoyés: ${c.sent}/${c.total_recipients} | Statut: ${c.status}
        </div>
      `).join('');
      
      document.getElementById('campaignsList').innerHTML = html || '<p>Aucune campagne</p>';
    } catch (error) {
      alert('Erreur: ' + error.message);
    }
  }
</script>
{% endblock %}
