<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Test Simple Bouton</title>
  <link rel="stylesheet" href="/static/css/edutools-ia.css">
  <style>
    body { margin: 0; padding: 20px; font-family: Arial, sans-serif; }
    h1 { color: #333; }
    .status { background: #f0f0f0; padding: 15px; border-radius: 8px; margin: 20px 0; }
    .test-button { margin: 20px 0; padding: 10px 20px; background: #667eea; color: white; border: none; border-radius: 4px; cursor: pointer; }
  </style>
</head>
<body>
  <h1>🧪 Test Simple du Bouton EduTools-IA</h1>
  
  <div class="status">
    <h2>Est-ce que vous voyez un bouton violet et animé en bas-à-droite?</h2>
    <p>Si oui, le CSS fonctionne ✅</p>
    <p>Si non, vérifiez la console du navigateur pour les erreurs 🔍</p>
  </div>

  <button class="test-button" onclick="testButton()">Test du Bouton</button>

  <!-- Le bouton EduTools-IA créé en HTML pur -->
  <div id="edutools-ia-button">
    <div class="ia-button-container">
      <div class="ia-button-pulse"></div>
      <button class="ia-button" title="EduTools-IA - Votre co-pilote intelligent" data-test="true">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="1"></circle>
          <path d="M12 1v6m0 6v6"></path>
          <path d="M4.22 4.22l4.24 4.24m5.08 5.08l4.24 4.24"></path>
          <path d="M1 12h6m6 0h6"></path>
          <path d="M4.22 19.78l4.24-4.24m5.08-5.08l4.24-4.24"></path>
        </svg>
      </button>
      <span class="ia-label">EduTools-IA</span>
    </div>
  </div>

  <script>
    console.log('✅ Page HTML chargée');
    const button = document.getElementById('edutools-ia-button');
    console.log('Bouton trouvé:', button);
    console.log('Styles calculees:', getComputedStyle(button));
    
    document.querySelector('[data-test="true"]').addEventListener('click', () => {
      alert('Bouton cliqué! Le JavaScript fonctionne.');
    });

    function testButton() {
      console.log('Test du bouton...');
      const btn = document.querySelector('#edutools-ia-button .ia-button');
      console.log('Bouton intérieur:', btn);
      if (btn) {
        console.log('Styles:', getComputedStyle(btn));
        console.log('Position:', btn.getBoundingClientRect());
      }
    }
  </script>
</body>
</html>
